  <style>

    .tiktok-player {
      position: relative; width: 100%; aspect-ratio: 9 / 16; background: #000; border-radius: 35px; overflow: hidden;
      border: 3px solid rgba(0, 242, 255, 0.5); box-shadow: 0 0 50px rgba(0, 242, 255, 0.3);
    }
    .tiktok-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 32px; }

    .nav-arrow { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; color: white; z-index: 50; }
    .nav-arrow:hover { background: #00f2ff; color: black; transform: scale(1.2); box-shadow: 0 0 40px #00f2ff; }

    /* הסוד מהדף שעובד לך: תאים קשיחים ומרכוז Margin */
    .nav-stable-container { width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(7, 1fr); height: 100%; align-items: center; justify-items: center; }
    .nav-cell { width: 130px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; transform-gpu: translateZ(0); }
    .active-icon { transform: scale(1.25); color: #00f2ff; filter: drop-shadow(0 0 15px rgba(0,242,255,0.8)); }

    <div class="flex items-center justify-center gap-4 md:gap-24 w-full max-w-6xl mx-auto mb-20">
      <button onclick="changePodcast('prev')" class="nav-arrow hidden md:flex"><span class="material-symbols-outlined text-4xl">arrow_forward_ios</span></button>

        </div>
        <div id="playerWrapper" class="tiktok-player w-full">
           <iframe id="mainPlayer" src="" loading="lazy" allow="autoplay; fullscreen"></iframe>
        </div>
        <div class="flex md:hidden gap-12 mt-6">
            <button onclick="changePodcast('prev')" class="nav-arrow w-16 h-16"><span class="material-symbols-outlined text-3xl">arrow_forward_ios</span></button>
            <button onclick="changePodcast('next')" class="nav-arrow w-16 h-16"><span class="material-symbols-outlined text-3xl">arrow_back_ios_new</span></button>
        </div>
      </div>
      <button onclick="changePodcast('next')" class="nav-arrow hidden md:flex"><span class="material-symbols-outlined text-4xl">arrow_back_ios_new</span></button>
    </div>
  </main>

  <nav class="fixed bottom-6 left-0 right-0 z-50 px-4">
    <div class="glass-card h-24 shadow-2xl bg-black/90 border-white/10 overflow-hidden mx-auto nav-stable-container">

          <div class="nav-cell"><a href="podcasts.html" class="flex flex-col items-center active-icon"><span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">podcasts</span><span class="text-[9px] font-black mt-1 text-cyber-cyan neon-text">פוד</span></a></div>

    </div>
  </nav>

  <script>
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('translate-x-full'); }
    const podcasts = [
      { id: "19jkfRcyLBWxZGgvVuH_VDzl9ky0u7J8x", he: "פרק 01", en: "EP 01" },
      { id: "1t5qIpQ993Sr9BflVgCvOdso7lh1LsGqe", he: "פרק 02", en: "EP 02" },
      { id: "1ieArbHiGZeWsxz1sWtbLLHafv7HrD6hL", he: "פרק 03", en: "EP 03" },
      { id: "1FQeIEccfmqvJV3LqU7A7fJXK21OQ0Ql-", he: "פרק 04", en: "EP 04" },
      { id: "1ibCtLjN9-ccIgOrpizEefh3pNyPAmj5V", he: "פרק 05", en: "EP 05" },
      { id: "1pK3MzJDv2oZXqnLATzZ5stCBdAdhl830", he: "פרק 06", en: "EP 06" },
      { id: "1kUKJEcQI__Lg8rgTvqYdCXIQ2Iib46kP", he: "פרק 07", en: "EP 07" },
      { id: "10lIZJ9_0402MkLFmUGbG8mnjYUomVwcV", he: "פרק 08", en: "EP 08" },
      { id: "1tyC7XFFj08YbHMefhSE2O3SBaLNuNvrv", he: "פרק 09", en: "EP 09" }
    ];
    let currentIndex = 0;
    function loadCurrentPodcast() {
      const p = podcasts[currentIndex];
      document.getElementById('mainPlayer').src = `https://drive.google.com/file/d/${p.id}/preview`;
      document.getElementById('podcastTitle').textContent = p.he;
      document.getElementById('podcastCounter').textContent = `${currentIndex + 1} / ${podcasts.length}`;
    }
    function changePodcast(dir) {
      if(dir === 'next') currentIndex = (currentIndex + 1) % podcasts.length;
      else currentIndex = (currentIndex - 1 + podcasts.length) % podcasts.length;
      loadCurrentPodcast();
    }
    function toggleLang() { let n = document.documentElement.getAttribute('data-lang') === 'he' ? 'en' : 'he'; document.documentElement.setAttribute('data-lang', n); loadCurrentPodcast(); }
    loadCurrentPodcast();
  </script>
