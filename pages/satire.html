  <style>
    html:not([data-lang="he"]) .he { display: none !important; }
    html:not([data-lang="en"]) .en { display: none !important; }
    html:not([data-lang="ru"]) .ru { display: none !important; }

    body { background-color: #050608; color: #f8f8ff; font-family: 'Rubik', sans-serif; overflow-x: hidden; min-height: 100vh; }
    
    /* הרקע מהתמונה image_4b349e.png */
    .bg-grid {
      background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0);
      background-size: 40px 40px;
    }
    .blob { position: absolute; width: 60vw; height: 60vw; border-radius: 50%; filter: blur(120px); opacity: 0.1; z-index: -1; }

    .neon-title { color: #fff; text-shadow: 0 0 20px rgba(0, 242, 255, 0.8), 0 0 40px rgba(0, 242, 255, 0.4); font-family: 'Outfit', sans-serif; }

    .glass-card { 
      background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); 
      border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

    /* עיצוב תיקייה מהצילום מסך image_5801a9.jpg */
    .folder-icon {
      width: 110px; height: 80px; 
      background: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
      border-radius: 4px 14px 14px 14px; position: relative;
      box-shadow: 0 15px 35px rgba(0, 102, 255, 0.4);
    }
    .folder-icon::before {
      content: ""; position: absolute; top: -12px; left: 0; width: 45px; height: 12px; background: #00f2ff; border-radius: 6px 6px 0 0;
    }

    .tiktok-player {
      position: relative; width: 100%; aspect-ratio: 9 / 16; background: #000; border-radius: 35px; overflow: hidden;
      border: 3px solid rgba(0, 242, 255, 0.5); box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
    }
    .tiktok-player iframe, .tiktok-player img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 32px; object-fit: contain; }

    .nav-arrow { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 50%; width: 65px; height: 65px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; color: white; z-index: 50; }
    .nav-arrow:hover { background: #00f2ff; color: black; transform: scale(1.1); }

    /* סרגל "בטון" יציב */
    .nav-stable-container { width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(7, 1fr); height: 100%; align-items: center; justify-items: center; }
    .nav-cell { width: 130px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .active-icon { color: #00f2ff; filter: drop-shadow(0 0 12px rgba(0,242,255,0.9)); transform: scale(1.2); }

    .hide-scrollbar::-webkit-scrollbar { display: none; }

<body class="pb-40 selection:bg-cyan-500/30">

  <div class="blob bg-purple-900 top-[-10%] left-[-10%] opacity-20"></div>

    </div>

    <!-- גריד תיקיות מהתמונה -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-12 w-full max-w-5xl mb-32" id="folderGrid"></div>

    <!-- תצוגת המדיה -->

      <div class="flex flex-col sm:flex-row items-center justify-between gap-6 glass-card p-8 rounded-3xl border-white/10">
        <button onclick="showFolders()" class="group flex items-center gap-3 px-6 py-3 rounded-full border-2 border-white/20 hover:border-cyber-cyan text-white transition-all font-bold uppercase text-sm">
          <span class="material-symbols-outlined group-hover:-translate-x-2 transition-transform">arrow_back</span>

        </button>
        <h2 id="currentFolderName" class="font-heading font-black text-4xl text-cyber-cyan uppercase neon-title text-center"></h2>
      </div>
      
      <div class="flex items-center justify-center gap-4 md:gap-24 w-full max-w-6xl mx-auto mb-20 relative">
        <button onclick="changeMedia('prev')" class="nav-arrow hidden md:flex"><span class="material-symbols-outlined text-4xl">arrow_forward_ios</span></button>
        <div class="flex flex-col items-center gap-10 w-full max-w-[420px]">

          <div id="playerWrapper" class="tiktok-player w-full"><div id="mediaBox" class="w-full h-full"></div></div>
          <div class="flex md:hidden gap-12 mt-6">
              <button onclick="changeMedia('prev')" class="nav-arrow w-16 h-16"><span class="material-symbols-outlined text-3xl">arrow_forward_ios</span></button>
              <button onclick="changeMedia('next')" class="nav-arrow w-16 h-16"><span class="material-symbols-outlined text-3xl">arrow_back_ios_new</span></button>

        </div>
        <button onclick="changeMedia('next')" class="nav-arrow hidden md:flex"><span class="material-symbols-outlined text-4xl">arrow_back_ios_new</span></button>

    </div>

  <nav class="fixed bottom-6 left-0 right-0 z-50 px-4">
    <div class="glass-card h-24 shadow-2xl bg-black/90 border-white/10 overflow-hidden mx-auto nav-stable-container">
          <div class="nav-cell"><a href="../index.html" class="flex flex-col items-center text-white/40"><span class="material-symbols-outlined text-3xl">home</span><span class="text-[9px] font-black mt-1">ראשי</span></a></div>
          <div class="nav-cell"><a href="creative.html" class="flex flex-col items-center text-white/40"><span class="material-symbols-outlined text-3xl">palette</span><span class="text-[9px] font-black mt-1">יצירה</span></a></div>
          <div class="nav-cell"><a href="satire.html" class="flex flex-col items-center active-icon"><span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">theater_comedy</span><span class="text-[9px] font-black mt-1 text-cyber-cyan">סאטירה</span></a></div>
          <div class="nav-cell"><a href="podcasts.html" class="flex flex-col items-center text-white/40"><span class="material-symbols-outlined text-3xl">podcasts</span><span class="text-[9px] font-black mt-1">פוד</span></a></div>
          <div class="nav-cell"><a href="lessons.html" class="flex flex-col items-center text-white/40"><span class="material-symbols-outlined text-3xl">handshake</span><span class="text-[9px] font-black mt-1">לקוחות</span></a></div>
          <div class="nav-cell"><a href="songs.html" class="flex flex-col items-center text-white/40"><span class="material-symbols-outlined text-3xl">music_note</span><span class="text-[9px] font-black mt-1">שירים</span></a></div>
          <div class="nav-cell"><a href="posttrauma.html" class="flex flex-col items-center text-white/40"><span class="material-symbols-outlined text-3xl">psychology</span><span class="text-[9px] font-black mt-1">טראומה</span></a></div>
    </div>
  </nav>

  <script>
    const satireFolders = [
      { id: "videos", nameHe: "סרטונים", nameEn: "VIDEOS", type: "video", items: ["10TlRjXq_Sbnj_IYZYdCaeWAp-jAiOVzq", "1oU2CDGhO7etNaJGWZWYlLo8MUkGuNEpE", "1teOGWoYwaH7y02rxzvvLYDTovtAk9Tij", "1mTmBwAM9TnUJhks3QngjjYPw2adIISy7", "1rGCnr_yB1YJXE5m2FhirNIZquc5p0ZNg", "1uOa8PFg_HeTurFmkXLtBPwXlnUbFslSp", "1d8nT8jrFPl-oKRfDpxLdc2W65c2Bez2Z", "1rXZX-dfXtQ1vSVE43iiZBWQuayvg33Mk", "1qZWNusMR6m9xy3Y5zF_Ea_9fOfF0vZJr", "1uzwMhiPQerJtp4YXqDpA-kcz_9IAmQxz", "1Ob7CFA6ICJI6vac0JIoQUwG9f1SkiKyH", "1QiRaC8FDDvgYip2ka4sWjPK2wH7gZGDR", "1EUbcR8S0Xnw5gAeB_uO5kXGeeabyxV4R", "1Sh5-MtMW250wWujrk4lmtU4NOFs1QeN3", "1w-C9H5bN4BRHB3BVHgGC03vuyha_n1eh", "1aNvL87g_mlL8W0O8lzADQmJOKwh5kshU", "1uEvPqi82SYx5h8KiQs7gRhdEkA6g5TbZ", "1w8eI8LHsuynN1DOtCFBVzLkDXv9CvepV", "1_MPp6oATxhXVJ5u3lfkAdX7EGU1x28ak", "1RKZZKRm3HZ2kAWaeBvgrEwuqz5ADR7TU", "1JDZbAHwOnIk5F4tmOtq1xVTRp4wQfVcv", "17mySf2Kq7i0Zm5y9lsLfzLitFTnpafrq"] },
      { id: "photos", nameHe: "תמונות", nameEn: "PHOTOS", type: "image", items: ["1s2QGj81IALt13WViKFbf91N31bKZqb8T", "13NxPpc_-w1fS5Q8wa1N5B6K_AtglvKyJ", "1md5El_ckgwt17NCouQ1c0I2WuUmqORf0", "1x_VOGuC85kxphXQfuW8gnbwPCiQHB-i0", "1TYAdWoXjQSGqqDkr9F9qTyDLsGhfuMp2", "1VGjp2oUXncPqMJNXOaLd2XLRxgzoogAf", "1cBhThW5_uDeDNAPwE6iNPvRa8G3XSELl", "18zBGOn77AfZBBHOQlVfkGU1Je10sQA41", "1qZOWDC1NyGarM825wwGLpIHR8sEtq_bK", "1FdMG20PsF0OOkNvpz_ZXm63WrwmFjFbr", "1j7xiMTRzOrbHCSM2osiZgzEqXt60Z5eT", "1XMyv3je712CUDY07L-naCa9VHdTKmGcm", "16-pR1sGzKPvSTmUA-nTYgAahXItm52T-", "1NdUWRbOSbf9-dm0jF0ZsklPBT2k6Bwxs", "1u0NDKRnzYxCBlEfq2qO2rXWJNQw_4U3t"] },
      { id: "podcasts", nameHe: "פודקאסטים", nameEn: "PODCASTS", type: "video", items: ["1gqRcA3Z5nT264xW5_6pZ4TffoXX4L25y", "12b_6ZQz0JLoY4SQ7ZClifyw1ZhP3YZ0b", "1cdXWhosYEojOYQKZbUY6Wc7zh1SpjXJI", "1z90HZQlr_lTdECeyylQHnW7P8yM4VpkL"] }
    ];

    let currentFolderItems = []; let currentMediaType = "video"; let currentMediaIndex = 0;

    function renderFolders() {
      const grid = document.getElementById('folderGrid'); grid.innerHTML = "";
      satireFolders.forEach(f => {
        const div = document.createElement('div');
        div.className = 'glass-card p-12 flex flex-col items-center justify-center cursor-pointer group';
        div.onclick = () => openFolder(f);
        div.innerHTML = `<div class="folder-icon mb-10 group-hover:scale-110 transition-transform"></div><div class="text-2xl font-black text-white/90 group-hover:text-cyber-cyan transition-colors text-center tracking-widest uppercase"><span class="he">${f.nameHe}</span><span class="en">${f.nameEn}</span></div>`;
        grid.appendChild(div);
      });
    }

    function openFolder(f) {
      document.getElementById('folderGrid').classList.add('hidden'); document.getElementById('mainHeader').classList.add('hidden');
      document.getElementById('folderContentView').classList.remove('hidden'); document.getElementById('folderContentView').classList.add('flex');
      document.getElementById('currentFolderName').textContent = f.nameHe;
      currentFolderItems = f.items; currentMediaType = f.type; currentMediaIndex = 0; loadCurrentMedia();
    }

    function loadCurrentMedia() {
      const id = currentFolderItems[currentMediaIndex]; const mediaBox = document.getElementById('mediaBox');
      mediaBox.innerHTML = currentMediaType === 'video' ? `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>` : `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w1000" alt="Work Item">`;
      document.getElementById('mediaCounter').textContent = `${currentMediaIndex + 1} / ${currentFolderItems.length}`;
    }

    function changeMedia(dir) {
      if (dir === 'next') currentMediaIndex = (currentMediaIndex + 1) % currentFolderItems.length;
      else currentMediaIndex = (currentMediaIndex - 1 + currentFolderItems.length) % currentFolderItems.length;
      loadCurrentMedia();
    }

    function showFolders() { document.getElementById('folderGrid').classList.remove('hidden'); document.getElementById('mainHeader').classList.remove('hidden'); document.getElementById('folderContentView').classList.add('hidden'); }
    function toggleLang() { const h = document.documentElement; let n = h.getAttribute('data-lang') === 'he' ? 'en' : 'he'; h.setAttribute('data-lang', n); h.setAttribute('dir', n === 'he' ? 'rtl' : 'ltr'); }
    function toggleMenu() { alert("Menu"); }

    renderFolders();
  </script>
