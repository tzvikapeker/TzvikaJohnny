      border-radius: 24px;

    .glass-card:hover { 
      background: rgba(255, 255, 255, 0.07); 
      border-color: rgba(0, 242, 255, 0.5);

      box-shadow: 0 20px 60px rgba(0,0,0,0.5);

    .folder-icon {
      width: 110px; height: 80px;

      border-radius: 4px 14px 14px 14px; position: relative;
      box-shadow: 0 15px 35px rgba(0, 102, 255, 0.4);
    }
    .folder-icon::before {
      content: ""; position: absolute; top: -12px; left: 0; 
      width: 45px; height: 12px; background: #00f2ff; border-radius: 6px 6px 0 0;
    }

    /* סרגל בטון יציב */
