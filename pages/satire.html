  <style>
    /* לוגיקת שפות גלובלית */
    html[data-lang="en"] .he, html[data-lang="he"] .en { display: none !important; }
    html[data-lang="en"] { direction: ltr; } 
    html[data-lang="he"] { direction: rtl; }
    
    * { -webkit-tap-highlight-color: transparent; }
    body { background-color: #050608; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .hover-glow:hover {
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
      border-color: rgba(0, 242, 255, 0.5);
    }

    /* עיצוב תיקיות סאטירה */
    .folder-icon-modern {
      width: 90px;
      height: 70px;
      background: linear-gradient(135deg, #00f2ff, #2563eb);
      border-radius: 4px 12px 12px 12px;
      position: relative;
      box-shadow: 0 8px 25px rgba(0, 242, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .folder-icon-modern::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 0;
      width: 40px;
      height: 12px;
      background: linear-gradient(to right, #00f2ff, #0284c7);
      border-radius: 6px 6px 0 0;
    }

    /* נגנים מותאמים למובייל (לא תוקעים גלילה) */
    .video-container { 
      position: relative; 
      width: 100%; 
      aspect-ratio: 9 / 16; 
      background: #000; 
      border-radius: 16px; 
      overflow: hidden; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      touch-action: pan-y; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
    }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>

<body class="text-slate-300 font-['Manrope'] overflow-x-hidden pb-24 selection:bg-cyan-500/30">

  <header class="fixed top-0 w-full z-50 p-4 lg:px-8 flex justify-between items-center glass-card border-b-0 border-white/5">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-fuchsia-500 flex items-center justify-center text-black font-bold font-['Epilogue']">JP</div>

    <button id="langToggle" class="relative group overflow-hidden rounded-full px-5 py-1.5 border border-white/20 hover:border-cyan-400 transition-colors">

        <span class="font-['Space_Grotesk'] text-xs tracking-[0.2em] text-fuchsia-400 flex items-center justify-center gap-2">

          POLITICAL SATIRE
        </span>
      </div>
      
      <h1 class="font-['Epilogue'] font-black text-4xl md:text-5xl lg:text-6xl text-white tracking-tight drop-shadow-xl">
        <span class="en">Satire & Parody</span><span class="he">סאטירה פוליטית</span>
      </h1>
      <p class="text-slate-400 text-lg font-light max-w-xl mx-auto">
        <span class="en">Reality with a sting. Click a folder to view.</span><span class="he">המציאות עם עקיצה. לחצו על תיקייה לצפייה.</span>
      </p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-4xl" id="folderGrid"></div>

    <div id="folderContentView" class="hidden flex-col w-full max-w-5xl gap-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 glass-card p-4 rounded-2xl border-white/10">
        <button onclick="showFolders()" class="group flex items-center gap-2 px-5 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 hover:border-cyan-400 transition-all font-['Space_Grotesk'] text-sm tracking-wider text-white">
          <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
          <span class="he">חזרה לתיקיות</span><span class="en">Back to Folders</span>
        </button>
        <h2 id="currentFolderName" class="font-['Epilogue'] font-bold text-2xl text-cyan-400 m-0"></h2>
      </div>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 w-full" id="galleryGrid"></div>
    </div>

  </main>

  <nav class="fixed bottom-6 inset-x-4 sm:inset-x-auto sm:left-1/2 sm:-translate-x-1/2 bg-[#1a1b23]/90 backdrop-blur-xl border border-white/10 rounded-2xl px-4 py-3 sm:px-6 sm:py-4 flex justify-between sm:justify-center gap-2 sm:gap-8 items-center z-50 shadow-[0_20px_40px_rgba(0,0,0,0.8)] w-[calc(100%-2rem)] sm:w-auto max-w-lg mx-auto">

    </a>
    
    <a href="creative.html" class="flex flex-col items-center justify-center text-slate-500 hover:text-fuchsia-400 transition-all w-14">
      <span class="material-symbols-outlined text-[22px]">palette</span>
      <span class="text-[9px] font-['Space_Grotesk'] tracking-wider uppercase mt-1"><span class="en">Creative</span><span class="he">יצירה</span></span>
    </a>

    <a href="lessons.html" class="flex flex-col items-center justify-center text-slate-500 hover:text-fuchsia-400 transition-all w-14">
      <span class="material-symbols-outlined text-[22px]">handshake</span>
      <span class="text-[9px] font-['Space_Grotesk'] tracking-wider uppercase mt-1"><span class="en">Clients</span><span class="he">לקוחות</span></span>
    </a>
    
    <a href="satire.html" class="flex flex-col items-center justify-center text-cyan-400 drop-shadow-[0_0_10px_rgba(0,242,255,0.8)] scale-110 transition-all w-14">
      <span class="material-symbols-outlined text-[22px]" style="font-variation-settings: 'FILL' 1;">theater_comedy</span>
      <span class="text-[9px] font-['Space_Grotesk'] tracking-wider uppercase mt-1"><span class="en">Satire</span><span class="he">סאטירה</span></span>
    </a>
    
    <a href="podcasts.html" class="flex flex-col items-center justify-center text-slate-500 hover:text-fuchsia-400 transition-all w-14">
      <span class="material-symbols-outlined text-[22px]">podcasts</span>
      <span class="text-[9px] font-['Space_Grotesk'] tracking-wider uppercase mt-1"><span class="en">Podcast</span><span class="he">פודקאסט</span></span>
    </a>
  </nav>

  <script>
    const satireFolders = [
      { id: "videos", nameHe: "סרטונים", nameEn: "Videos", type: "video", items: ["1-22RkJTOfGGuCL5C_yUg1yl8zOMhKlnC", "12mvN-_f2H8e9qFmrhXJw6IRKWy-0iNqm", "1pEUPd_poUMCnyH7Yjryv5rdR4wpG3Pu4", "1AjR0fZmLHtxg8NXx7OdiBBOSqlxy38vl", "1xcRv0Rg3-zM_f2qz62SH9RCOVNrXr-sO", "1CSmfGwBj_vONRNiEwW318b9lIj_zOZqP", "1KGvXIt_QBqXyoMlLljCG2RVW1h1oD3PQ", "1BNgS2zIP7R5EigGYusJIT7zztAaeWve5", "1yykKPSBhmawNFc5u5amWbF6_4vr5qjBY", "15-kLxerh4uDtxCCVIcZP0GQL0x44UE-t", "103B94Tkss7ZtfjIK_Nha3hdsvE9L_Cn5", "1akLfun0ILEAC7osA8dDVB2iKjAX1R3Oe", "1FPp4Inz2AS-MoGGCKaRQ_sWyzK-I_9SB", "1x-GUPM1cCzlX8_eIL-YeRbN5b5xzbzbJ", "1XWaTGatmPjjBRZAhg15b2Dkd3RaK4tNv", "1HEeNJ4ugoFS-FctanKgK0P-0HwXPnf9U", "1X8Foic7a-Sp5t8HdVCbQjCgxDzcGGn_y", "1plmi9jhBLxj0ShU27j0LbW3NYHUHrC9q", "1fJBJVsEyyzmrxPIiTK_ezWhM5ONw4A_i"] },
      { id: "photos", nameHe: "תמונות", nameEn: "Photos", type: "image", items: ["1YyffcMub35FYd1iBsCFtvreT4PZ4EILf", "1CclLZT4DxJ_VVP7JI24ie350IVv4VueT", "1DhaQJF-_FTdqpE29g1Iifwk6TpDeur_E", "1xZwHCbZdBdiyR1z4RBXjUpGDxl2VOG51", "1J-k8Gwarrl96rm8L5h2OluVqFNTxG4av", "1tuLEZiJgl_ONd3kLY0puqdkhHh10HOk8", "1490TltDAEtv8wXTuJlYk-vKqiJZRxj1R", "1OBDTd23ze0-C2ZEeV_pSAH3mq-QTo0Xo"] }
    ];

    function renderFolders() {
      const grid = document.getElementById('folderGrid'); 
      grid.innerHTML = "";
      satireFolders.forEach(f => {
        const div = document.createElement('div'); 
        div.className = 'glass-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover-glow transition-all duration-300 group'; 
        div.onclick = () => openFolder(f);
        div.innerHTML = `
          <div class="folder-icon-modern group-hover:scale-110 transition-transform duration-300 mb-4">
             <div class="bg-white/20 p-2 rounded-full backdrop-blur-sm"><span class="material-symbols-outlined text-white text-[18px]">theater_comedy</span></div>
          </div>
          <div class="font-['Epilogue'] font-bold text-white text-lg tracking-wide text-center">
            <span class="he">${f.nameHe}</span><span class="en">${f.nameEn}</span>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    function openFolder(f) {
      document.getElementById('folderGrid').classList.add('hidden'); 
      document.getElementById('mainHeader').classList.add('hidden'); 
      document.getElementById('folderContentView').classList.remove('hidden');
      document.getElementById('folderContentView').classList.add('flex');
      
      const isHe = document.documentElement.getAttribute('data-lang') === 'he';
      document.getElementById('currentFolderName').textContent = isHe ? f.nameHe : f.nameEn;

      const gallery = document.getElementById('galleryGrid');
      gallery.innerHTML = f.items.map(id => f.type === "video" 
        ? `<div class="video-container"><iframe src="https://drive.google.com/file/d/${id}/preview" loading="lazy"></iframe></div>`
        : `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w800" class="w-full rounded-2xl border border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.6)]" loading="lazy">`).join('');
    }

    function showFolders() { 
      document.getElementById('folderGrid').classList.remove('hidden'); 
      document.getElementById('mainHeader').classList.remove('hidden'); 
      document.getElementById('folderContentView').classList.add('hidden');
      document.getElementById('folderContentView').classList.remove('flex'); 
      document.getElementById('galleryGrid').innerHTML = ''; // מחיקת הזיכרון כדי למנוע קריסה בנייד
    }

    // סנכרון שפה חכם
    const langBtn = document.getElementById('langToggle'); 
    const htmlTag = document.documentElement;

    function setLang(lang) {
      htmlTag.setAttribute('data-lang', lang);
      htmlTag.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      langBtn.querySelector('span.relative').textContent = lang === 'he' ? 'EN' : 'HE';
      localStorage.setItem('siteLang', lang);
    }

    langBtn.addEventListener('click', () => {
      const nextLang = htmlTag.getAttribute('data-lang') === 'en' ? 'he' : 'en';
      setLang(nextLang);
    });

    const savedLang = localStorage.getItem('siteLang') || 'he';
    setLang(savedLang); 
    
    renderFolders();
  </script>
</body>
</html>
