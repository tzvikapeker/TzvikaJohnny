  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 120px; }
    
    /* תפריט ניווט דביק - הוספתי z-index גבוה מאוד כדי שיהיה לחיץ */
    .sticky-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
      padding: 10px 20px; display: flex; gap: 20px; z-index: 9999;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .nav-item { 
      display: flex; flex-direction: column; align-items: center; 
      cursor: pointer; color: #888; font-size: 10px; transition: 0.3s; 
      pointer-events: auto; /* מוודא שהאזור לחיץ */
    }
    .nav-item:hover, .nav-item.active { color: #00f2ff; }

    .project-grid { 
      display: grid; grid-template-columns: 1fr; gap: 2rem; 
      padding: 1rem; max-width: 600px; margin: 0 auto; 
    }
    .card { 
      width: 100%; aspect-ratio: 9 / 16; background: #000; 
      border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
    }
    iframe { width: 100%; height: 100%; border: none; }

    @media (min-width: 768px) {
      .project-grid { grid-template-columns: repeat(2, 1fr); max-width: 1000px; }
    }
  </style>
</head>
