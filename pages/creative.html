<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Feed | Tzvika Johnny Peker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; margin: 0; color: #fff; font-family: 'Rubik', sans-serif; }
    
    /* מכל הגלריה - גלילה אופקית בתוך הדף */
    .snap-container {
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      padding: 20px 0;
      gap: 20px;
    }
    
    .snap-item {
      flex: 0 0 85vw; /* נותן לראות קצת מהבא בתור */
      scroll-snap-align: center;
      aspect-ratio: 9 / 16;
    }

    .iframe-wrapper { 
      width: 100%; 
      height: 100%; 
      background: #111; 
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <a href="../index.html" class="block p-6 text-white/70">
    <span class="text-xl">← חזרה</span>
  </a>

  <h1 class="text-center text-2xl font-black uppercase mb-6">Creative Feed</h1>

  <div id="feed" class="snap-container"></div>

    const feed = document.getElementById('feed');
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const wrapper = entry.target.querySelector('.iframe-wrapper');
        if (entry.isIntersecting) {
          wrapper.innerHTML = `<iframe src="https://drive.google.com/file/d/${wrapper.dataset.id}/preview" allow="autoplay; fullscreen"></iframe>`;
        } else {
          wrapper.innerHTML = '';
        }
      });
    }, { threshold: 0.1 });

    videos.forEach(id => {
      const item = document.createElement('div');
      item.className = "snap-item";
      item.innerHTML = `<div class="iframe-wrapper" data-id="${id}"></div>`;
      feed.appendChild(item);
      observer.observe(item);
    });
  </script>
