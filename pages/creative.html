  <style>
    body { background: #050505; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
    
    .player-wrapper { display: flex; align-items: center; justify-content: center; height: 85vh; width: 100%; position: relative; }
    .video-frame { width: 90%; max-width: 400px; aspect-ratio: 9/16; background: #111; border-radius: 24px; overflow: hidden; border: 2px solid #00f2ff; box-shadow: 0 0 30px rgba(0,242,255,0.2); }
    
    .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border-radius: 50%; padding: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); font-size: 20px; transition: 0.3s; }
    .nav-arrow:hover { background: rgba(0, 242, 255, 0.2); }
    .arrow-left { left: 20px; }
    .arrow-right { right: 20px; }

    .sticky-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 12px 25px; display: flex; gap: 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; font-size: 10px; transition: 0.3s; }
    .nav-item:hover, .nav-item.active { color: #00f2ff; }
    
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
