<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tzvika Johnny Peker | Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #050505; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }
    
    /* הנגן המרכזי */
    .player-wrapper { 
      display: flex; align-items: center; justify-content: center; 
      height: 85vh; width: 100%; position: relative; 
    }
    .video-frame { 
      width: 90%; max-width: 400px; aspect-ratio: 9/16; 
      background: #111; border-radius: 24px; overflow: hidden; 
      border: 2px solid #00f2ff; box-shadow: 0 0 30px rgba(0,242,255,0.2);
    }
    
    /* חצי ניווט */
    .nav-arrow { 
      position: absolute; top: 50%; transform: translateY(-50%); 
      background: rgba(255,255,255,0.1); border-radius: 50%; 
      padding: 15px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
    }
    .arrow-left { left: 20px; }
    .arrow-right { right: 20px; }

    /* התפריט התחתון (הדוק) */
    .sticky-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
      padding: 12px 25px; display: flex; gap: 20px; z-index: 1000;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #888; font-size: 10px; }
    .nav-item.active { color: #00f2ff; }
  </style>
</head>
<body>

  <div class="player-wrapper">
    <div class="nav-arrow arrow-left" onclick="changeVideo(-1)">❮</div>
    <div id="video-container" class="video-frame"></div>
    <div class="nav-arrow arrow-right" onclick="changeVideo(1)">❯</div>
  </div>

  <nav class="sticky-nav">
    <div class="nav-item">🧠 <span>טראומה</span></div>
    <div class="nav-item">🎵 <span>שירים</span></div>
    <div class="nav-item active">🤝 <span>לקוחות</span></div>
    <div class="nav-item">📡 <span>פודקאסט</span></div>
    <div class="nav-item">🎭 <span>סאטירה</span></div>
    <div class="nav-item">🎨 <span>יצירה</span></div>
    <div class="nav-item">🏠 <span>ראשי</span></div>
  </nav>

  <script>
    const videoIds = ["1ypXVriVw0EOC47YP2qRjgTnERK7fyJm9", "1QcVSof_lka6y2T1PzUvLdRdv4h3NVzC0", "1DTsQebKGIKR2Ia3uwhQTglEbLNG4MJCs"]; // וכו'...
    let currentIndex = 0;

    function showVideo(index) {
      const container = document.getElementById('video-container');
      container.innerHTML = `<iframe src="https://drive.google.com/file/d/${videoIds[index]}/preview" allow="fullscreen" allowfullscreen></iframe>`;
    }

    function changeVideo(dir) {
      currentIndex = (currentIndex + dir + videoIds.length) % videoIds.length;
      showVideo(currentIndex);
    }

    showVideo(0);
  </script>
</body>
</html>
