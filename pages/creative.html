<!DOCTYPE html>
<html lang="he" data-lang="he" dir="rtl" class="dark">
<head>

  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes" name="viewport"/>
  <title>Creative | Tzvika Johnny Peker</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;700;900&family=Manrope:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#050608",
            "accent": "#ffb86c",
          }
        }
      }
    }
  </script>

  <style>
    /* לוגיקת שפות גלובלית */
    html[data-lang="en"] .he, html[data-lang="he"] .en { display: none !important; }
    html[data-lang="en"] { direction: ltr; } 
    html[data-lang="he"] { direction: rtl; }
    
    * { -webkit-tap-highlight-color: transparent; }
    body { background-color: #050608; }
    
    /* אפקטים מיוחדים מהעיצוב החדש */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .hover-glow:hover {
      box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
      border-color: rgba(0, 242, 255, 0.5);
    }

    /* עיצוב תיקיות */
    .folder-icon-modern {
      width: 90px;
      height: 70px;
      background: linear-gradient(135deg, #00f2ff, #2563eb);
      border-radius: 4px 12px 12px 12px;
      position: relative;
      box-shadow: 0 8px 25px rgba(0, 242, 255, 0.3);
    }
    .folder-icon-modern::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 0;
      width: 40px;
      height: 12px;
      background: linear-gradient(to right, #00f2ff, #0284c7);
      border-radius: 6px 6px 0 0;
    }

    .video-container { 
      position: relative; 
      width: 100%; 
      aspect-ratio: 9 / 16; 
      background: #000; 
      border-radius: 16px; 
      overflow: hidden; 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      touch-action: pan-y; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
    }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
  </style>
</head>

<body class="text-slate-300 font-['Manrope'] overflow-x-hidden pb-24 selection:bg-cyan-500/30">

  <div class="fixed inset-0 z-[-1] bg-[#121318]">
    <div class="absolute top-0 left-0 w-full h-[500px] bg-gradient-to-b from-fuchsia-900/20 via-cyan-900/10 to-transparent"></div>
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAwIDEwIEwgNDAgMTAgTSAxMCAwIEwgMTAgNDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsIDI1NSwgMjU1LCAwLjAyKSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9wYXR0ZXJuPjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSJ1cmwoI2dyaWQpIi8+PC9zdmc+')] opacity-50"></div>
  </div>

  <header class="fixed top-0 w-full z-50 p-4 lg:px-8 flex justify-between items-center glass-card border-b-0 border-white/5">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-fuchsia-500 flex items-center justify-center text-black font-bold font-['Epilogue']">JP</div>
      <div class="font-['Epilogue'] font-bold tracking-[0.15em] text-sm hidden sm:block text-white">TZVIKA JOHNNY</div>
    </div>
    
    <button id="langToggle" class="relative group overflow-hidden rounded-full px-5 py-1.5 border border-white/20 hover:border-cyan-400 transition-colors">
      <span class="relative z-10 font-['Space_Grotesk'] text-xs font-bold tracking-widest text-cyan-400 group-hover:text-white transition-colors">EN</span>
      <div class="absolute inset-0 bg-cyan-400 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
    </button>
  </header>

  <main class="relative pt-32 pb-10 px-6 max-w-7xl mx-auto flex flex-col items-center min-h-[80vh]">
    
    <div id="mainHeader" class="text-center space-y-4 z-10 w-full mb-16">
      <div class="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10 backdrop-blur-sm mb-2">
        <span class="font-['Space_Grotesk'] text-xs tracking-[0.2em] text-fuchsia-400 flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-sm">palette</span>
          PORTFOLIO
        </span>
      </div>
      
      <h1 class="font-['Epilogue'] font-black text-4xl md:text-6xl text-white tracking-tight drop-shadow-xl">
        <span class="en">My Creative</span><span class="he">קריאייטיב שלי</span>
      </h1>
      <p class="text-slate-400 text-lg font-light max-w-xl mx-auto">
        <span class="en">Click a folder to view works.</span><span class="he">לחצו על תיקייה לצפייה בעבודות.</span>
      </p>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-4xl" id="folderGrid"></div>

    <div id="folderContentView" class="hidden flex-col w-full max-w-5xl gap-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 glass-card p-4 rounded-2xl border-white/10">
        <button onclick="showFolders()" class="group flex items-center gap-2 px-5 py-2 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 hover:border-cyan-400 transition-all font-['Space_Grotesk'] text-sm tracking-wider text-white">
          <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
          <span class="he">חזרה לתיקיות</span><span class="en">Back to Folders</span>
        </button>
        <h2 id="currentFolderName" class="font-['Epilogue'] font-bold text-2xl text-cyan-400 m-0"></h2>
      </div>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 w-full" id="galleryGrid"></div>
    </div>

  </main>

  <nav class="fixed bottom-6 inset-x-6 md:inset-x-auto md:left-1/2 md:-translate-x-1/2 bg-[#1a1b23]/90 backdrop-blur-xl border border-white/10 rounded-2xl px-6 py-4 flex justify-between md:justify-center md:gap-12 items-center z-50 shadow-[0_20px_40px_rgba(0,0,0,0.8)] max-w-md mx-auto">
    
    <a href="../index.html" class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-400 transition-all">
      <span class="material-symbols-outlined">home</span>
      <span class="text-[10px] font-['Space_Grotesk'] tracking-widest uppercase mt-1"><span class="en">Home</span><span class="he">ראשי</span></span>
    </a>
    
    <a href="creative.html" class="flex flex-col items-center justify-center text-cyan-400 drop-shadow-[0_0_10px_rgba(0,242,255,0.8)] scale-110 transition-all">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">palette</span>
      <span class="text-[10px] font-['Space_Grotesk'] tracking-widest uppercase mt-1"><span class="en">Creative</span><span class="he">יצירה</span></span>
    </a>
    
    <a href="satire.html" class="flex flex-col items-center justify-center text-slate-500 hover:text-fuchsia-400 transition-all">
      <span class="material-symbols-outlined">theater_comedy</span>
      <span class="text-[10px] font-['Space_Grotesk'] tracking-widest uppercase mt-1"><span class="en">Satire</span><span class="he">סאטירה</span></span>
    </a>
    
    <a href="podcasts.html" class="flex flex-col items-center justify-center text-slate-500 hover:text-fuchsia-400 transition-all">
      <span class="material-symbols-outlined">podcasts</span>
      <span class="text-[10px] font-['Space_Grotesk'] tracking-widest uppercase mt-1"><span class="en">Podcast</span><span class="he">פודקאסט</span></span>
    </a>
  </nav>

  <script>
    const creativeFolders = [
      { id: "reels", nameHe: "REELS", nameEn: "REELS", items: ["1pJ936-J1w-5xP0hgSrD72dnAldFTlrnk", "1OomQoJi0j23dkSm6L2VDf4ZRKF54EYxR", "1EwZ-4b60wNygFCRk-KzJnr7LGIHdzBP3", "16lemEvsbSlj4fys_vPYxb-b7auWaIGJP", "13nCAZ0LjbJ6a32p8ninsxLak6dKXHPjk", "1da3Cy63y2nJsKPpdOSrphZ7um8NlRdVd", "1p6lJ9EFLlCkwAEjGDRIIzvBq972D2wD-"], type: "video" },
      { id: "ads", nameHe: "פרסומות", nameEn: "Ads", items: ["1Y3F4BSj15Z3QCf3s5Rdzw7C0JyJYuq9V", "1lJXcYYAer5ZJ2vmz36aBKCDx8ZfMS_lr", "1w4XchLZ6H9AhkMu9ybWikdBq9zGPyWSd", "1CR-Q_QB58GcG4SECUdG5MAxMl-HUY7Gi", "1AE7UO3etTnlYBFG_c1UVKbZRSqwzxXsJ", "1A2zsQmzFStQp2RTNI4Y3oUHN1W4XqrtT"], type: "video" },
      { id: "heart", nameHe: "מהלב", nameEn: "From Heart", items: ["1R4J6ReW90VVtaCUd221ozzk8q9PTkMxR", "150Fuq4Iljfo_3S2595lgYHChR86j9VrI", "14-Ul7MhJvgMVdqSDYkZqrt59qO51ierw", "14BUAoBy1A4WF388Q_0hjq6lv3B-lvGMc", "1otk559-02FywZLwV8TEown-zWpElm4ai"], type: "video" },
      { id: "photos", nameHe: "תמונות", nameEn: "Photos", items: ["185Aus2D_CzSEebIPsWmQ9z31MbHyDwNv", "1bB6URSsuUk5xVWt1iK5MjCATLKn0fbkb", "1W30xp_Y1ahtG4cQ_vZjK_P4hzf--7I6P"], type: "image" }
    ];

    function renderFolders() {
      const grid = document.getElementById('folderGrid'); 
      grid.innerHTML = "";
      creativeFolders.forEach(f => {
        const div = document.createElement('div'); 
        div.className = 'glass-card rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover-glow transition-all duration-300 group'; 
        div.onclick = () => openFolder(f);
        div.innerHTML = `
          <div class="folder-icon-modern group-hover:scale-110 transition-transform duration-300 mb-4"></div>
          <div class="font-['Epilogue'] font-bold text-white text-lg tracking-wide text-center">
            <span class="he">${f.nameHe}</span><span class="en">${f.nameEn}</span>
          </div>
        `;
        grid.appendChild(div);
      });
    }

    function openFolder(f) {
      document.getElementById('folderGrid').classList.add('hidden'); 
      document.getElementById('mainHeader').classList.add('hidden'); 
      document.getElementById('folderContentView').classList.remove('hidden');
      document.getElementById('folderContentView').classList.add('flex');
      
      const isHe = document.documentElement.getAttribute('data-lang') === 'he';
      document.getElementById('currentFolderName').textContent = isHe ? f.nameHe : f.nameEn;

      const gallery = document.getElementById('galleryGrid');
      gallery.innerHTML = f.items.map(id => f.type === "video" 
        ? `<div class="video-container"><iframe src="https://drive.google.com/file/d/${id}/preview" loading="lazy"></iframe></div>`
        : `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w800" class="w-full rounded-2xl border border-white/10 shadow-[0_10px_30px_rgba(0,0,0,0.6)]" loading="lazy">`).join('');
    }

    function showFolders() { 
      document.getElementById('folderGrid').classList.remove('hidden'); 
      document.getElementById('mainHeader').classList.remove('hidden'); 
      document.getElementById('folderContentView').classList.add('hidden');
      document.getElementById('folderContentView').classList.remove('flex'); 
      document.getElementById('galleryGrid').innerHTML = ''; // מחיקת זיכרון
    }

    const langBtn = document.getElementById('langToggle'); 
    const htmlTag = document.documentElement;

    function setLang(lang) {
      htmlTag.setAttribute('data-lang', lang);
      htmlTag.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
      langBtn.querySelector('span.relative').textContent = lang === 'he' ? 'EN' : 'HE';
      localStorage.setItem('siteLang', lang);
    }

    langBtn.addEventListener('click', () => {
      const nextLang = htmlTag.getAttribute('data-lang') === 'en' ? 'he' : 'en';
      setLang(nextLang);
    });

    const savedLang = localStorage.getItem('siteLang') || 'he';
    setLang(savedLang); 
    
    renderFolders();
  </script>
</body>
</html>
