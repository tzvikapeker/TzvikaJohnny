<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Feed | Responsive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: #fff; margin: 0; font-family: sans-serif; }
    
    /* ה-Grid הדינמי: 1 עמודה במובייל, 4 במחשב */
    .project-grid { 
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      padding: 1rem;
    }

    /* הנגן שמתאים את עצמו */
    .card { 
      aspect-ratio: 9 / 16; 
      background: #000; 
      border-radius: 12px; 
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ב-Desktop נגביל את ה-Grid למרכז */
    @media (min-width: 1024px) {
      .project-grid { max-width: 1200px; margin: 0 auto; }
    }
  </style>
</head>
<body>

  <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
    <a href="../index.html" class="text-white/60">← חזרה</a>
  </header>

  <div id="gallery" class="project-grid"></div>

  <script>
    const videoIds = ["1ypXVriVw0EOC47YP2qRjgTnERK7fyJm9", /* ... כל ה-42 ... */];

    const gallery = document.getElementById('gallery');
    videoIds.forEach(id => {
      const card = document.createElement('div');
      card.className = "card";
      // שימוש ב-preview עם הגדרות ספציפיות למסך מלא
      card.innerHTML = `
        <iframe 
          src="https://drive.google.com/file/d/${id}/preview" 
          allow="fullscreen" 
          allowfullscreen>
        </iframe>`;
      gallery.appendChild(card);
    });
  </script>
</body>
</html>
