<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Feed | Tzvika Johnny Peker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; margin: 0; color: #fff; font-family: sans-serif; }
    
    /* תפריט ניווט וקטגוריות */
    .nav-bar { padding: 2rem; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
    .filter-btn { padding: 8px 16px; border-radius: 9999px; background: #222; margin: 0 5px; cursor: pointer; transition: 0.3s; }
    .filter-btn.active { background: #00f2ff; color: #000; font-weight: bold; }

    /* הגריד */
    .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .card { aspect-ratio: 9 / 16; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <header class="nav-bar">
    <a href="../index.html" class="flex items-center gap-2 hover:text-cyan-400">← חזרה</a>
    <div id="filter-container">
      <button class="filter-btn active" onclick="filterGallery('all')">הכל</button>
      <button class="filter-btn" onclick="filterGallery('satire')">סאטירה</button>
      <button class="filter-btn" onclick="filterGallery('music')">מוזיקה</button>
    </div>
  </header>

  <div id="gallery" class="project-grid"></div>

  <script>
    // הוספתי דוגמה לאיך לסווג את הפרויקטים שלך
    const videos = [
      { id: "1ypXVriVw0EOC47YP2qRjgTnERK7fyJm9", cat: "satire" },
      { id: "1QcVSof_lka6y2T1PzUvLdRdv4h3NVzC0", cat: "music" },
      // ... הוסף כאן את כל ה-IDs שלך עם הקטגוריה שלהם
    ];

    function renderGallery(filter = 'all') {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      
      const filtered = filter === 'all' ? videos : videos.filter(v => v.cat === filter);
      
      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = "card";
        card.innerHTML = `<iframe src="https://drive.google.com/file/d/${item.id}/preview" allow="fullscreen" allowfullscreen></iframe>`;
        gallery.appendChild(card);
      });
    }

    // ניהול ה-Active class לכפתורים
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderGallery(e.target.innerText === 'הכל' ? 'all' : e.target.innerText.toLowerCase());
      };
    });

    renderGallery(); // טעינה ראשונית
  </script>
</body>
</html>
