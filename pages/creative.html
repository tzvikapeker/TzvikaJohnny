<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Creative Feed | Johnny Peker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; margin: 0; overflow: hidden; }
    .snap-container {
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .snap-item {
      flex: 0 0 100vw;
      height: 100vh;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .iframe-wrapper { 
      width: 90%; 
      max-width: 380px; 
      aspect-ratio: 9 / 16; 
      background: #111; 
      border-radius: 20px;
      overflow: hidden;
    }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <a href="../index.html" class="fixed top-6 left-6 z-50 text-white bg-black/50 p-2 rounded-full">
    <span class="material-symbols-outlined">arrow_back</span>
  </a>

  <div id="feed" class="snap-container"></div>

  <script>
    const videos = [/* הכנס כאן את הרשימה שלך */];
    const feed = document.getElementById('feed');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const wrapper = entry.target.querySelector('.iframe-wrapper');
        if (entry.isIntersecting) {
          wrapper.innerHTML = `<iframe src="https://drive.google.com/file/d/${wrapper.dataset.id}/preview" allow="autoplay; fullscreen"></iframe>`;
        } else {
          wrapper.innerHTML = ''; 
        }
      });
    }, { threshold: 0.5 });

    videos.forEach(id => {
      const item = document.createElement('div');
      item.className = "snap-item";
      item.innerHTML = `<div class="iframe-wrapper" data-id="${id}"></div>`;
      feed.appendChild(item);
      observer.observe(item);
    });
  </script>
</body>
</html>
