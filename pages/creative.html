<!DOCTYPE html>
<html lang="he" data-lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Creative Gallery | Johnny Peker 2036</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Rubik:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    body { background-color: #0a0f1a; color: #f8f8ff; font-family: 'Rubik', sans-serif; }
    .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
  </style>
</head>
<body class="p-4 md:p-8">

  <header class="flex justify-between items-center mb-10 max-w-7xl mx-auto">
    <a href="../index.html" class="text-cyber-cyan flex items-center gap-2"><span class="material-symbols-outlined">arrow_back</span> חזרה</a>
    <h1 class="text-2xl font-black uppercase tracking-widest">Creative Gallery</h1>
  </header>

  <div id="filterBar" class="flex flex-wrap justify-center gap-4 mb-10"></div>

  <main class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="galleryGrid"></main>

  <script>
    // הלינקים ששלחת ממופים כאן. הוסף כל לינק חדש למערך הזה בלבד.
    const creativeWorks = [
      { category: "Creative", id: "16Ejhv02SEvS3bHbb-ByhFyGV5QzZF_5P" },
      { category: "Satire", id: "11r5MoePfKHPnYxaHu_frZ4hRq4tHCGqo" },
      { category: "Podcasts", id: "1SzxxdngMZwVNgckdmb6uYSj4UhI5YuEP" },
      { category: "Trauma", id: "1auwx_ZeQgeOLAtDgZ_G5mjss64iRM9sX" },
      // ... הוסף כאן את שאר ה-IDs מהרשימה הארוכה ששלחת
      { category: "Art", id: "1Md3ciydhSzM1DSFjo7z6AZzIbdHEYf8B" },
      { category: "Music", id: "1CAWqpldpKyupY_GDetknFcve9gLBPU-L" }
    ];

    function render(filter = 'All') {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = '';
      
      const filtered = filter === 'All' ? creativeWorks : creativeWorks.filter(w => w.category === filter);
      
      filtered.forEach(work => {
        const div = document.createElement('div');
        div.className = "glass-card p-2 hover:scale-[1.02] transition-transform";
        div.innerHTML = `<img src="https://drive.google.com/thumbnail?id=${work.id}&sz=w500" class="w-full h-40 object-cover rounded-xl">`;
        grid.appendChild(div);
      });
    }

    // יצירת כפתורי סינון אוטומטיים
    const categories = ['All', ...new Set(creativeWorks.map(w => w.category))];
    const filterBar = document.getElementById('filterBar');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = "px-4 py-2 bg-white/10 rounded-full hover:bg-cyber-cyan hover:text-black transition-all";
      btn.innerText = cat;
      btn.onclick = () => render(cat);
      filterBar.appendChild(btn);
    });

    render();
  </script>
</body>
</html>
