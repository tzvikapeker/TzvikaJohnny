<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Feed | Full Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #050608; color: #fff; margin: 0; }
    .project-card { 
      aspect-ratio: 9 / 16; 
      background: #111; border-radius: 16px; 
      cursor: pointer; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    /* ה-Modal שפותח למסך מלא */
    #modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); }
  </style>
</head>
<body class="p-4">

  <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 gap-3 max-w-7xl mx-auto"></div>

  <div id="modal">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-white text-2xl z-50">✕ סגור</button>
    <div id="modal-content" class="w-full h-full p-4"></div>
  </div>

  <script>
    const videoIds = ["1ypXVriVw0EOC47YP2qRjgTnERK7fyJm9", /* ... כל ה-42 שלך ... */];
    const gallery = document.getElementById('gallery');
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');

    videoIds.forEach(id => {
      const card = document.createElement('div');
      card.className = "project-card border border-white/10";
      card.innerHTML = `<span class="text-white/20">▶</span>`; // Thumbnail Placeholder
      card.onclick = () => openModal(id);
      gallery.appendChild(card);
    });

    function openModal(id) {
      modal.style.display = 'block';
      modalContent.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" class="w-full h-full" allowfullscreen></iframe>`;
    }

    function closeModal() {
      modal.style.display = 'none';
      modalContent.innerHTML = '';
    }
  </script>
</body>
</html>
