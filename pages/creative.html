  <style>
    body { background: #050505; color: #fff; margin: 0; font-family: sans-serif; height: 100vh; overflow: hidden; position: relative; }
    
    /* כפתור חזרה מקובע למעלה */
    .back-btn {
      position: absolute; top: 20px; right: 20px; z-index: 9999;
      color: rgba(255,255,255,0.7); text-decoration: none; font-size: 16px;
      display: flex; align-items: center; gap: 8px; transition: 0.3s;
      background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px;
    }
    .back-btn:hover { color: #00f2ff; border-color: #00f2ff; }

    /* מעטפת הנגן והכפתורים */
    .player-wrapper { 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      height: 100vh; width: 100%; position: absolute; top: -5%; left: 0; z-index: 10;
    }
    .video-frame { 
      width: 90%; max-width: 380px; aspect-ratio: 9/16; 
      background: #111; border-radius: 24px; overflow: hidden; 
      border: 2px solid #00f2ff; box-shadow: 0 10px 40px rgba(0,242,255,0.15);
    }
    
    /* כפתורי הבא / הקודם - בולטים וברורים מתחת לסרטון */
    .controls {
      display: flex; gap: 20px; margin-top: 20px; width: 90%; max-width: 380px; justify-content: space-between;
    }
    .control-btn {
      flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 30px; padding: 12px; color: #fff; font-size: 16px; font-weight: bold;
      cursor: pointer; transition: 0.3s; text-align: center; backdrop-filter: blur(10px);
    }
    .control-btn:hover { background: rgba(0, 242, 255, 0.2); color: #00f2ff; border-color: #00f2ff; }

    /* התפריט התחתון (הדוק) */
    .sticky-nav {
      position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
      background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 50px;
      padding: 15px 20px; display: flex; gap: 15px; z-index: 9999;
      box-shadow: 0 15px 40px rgba(0,0,0,0.8);
      width: max-content; max-width: 95vw; overflow-x: auto; scroll-behavior: smooth;
    }
    .sticky-nav::-webkit-scrollbar { display: none; }

    /* עיצוב כפתורי הניווט (לינקים) */
    .nav-item { 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; color: #aaa; font-size: 13px; transition: 0.3s; 
      min-width: 55px; pointer-events: auto; text-decoration: none;
    }
    .nav-icon { font-size: 22px; margin-bottom: 5px; transition: 0.3s; }
    .nav-item:hover, .nav-item.active { color: #00f2ff; font-weight: bold; }
    .nav-item:hover .nav-icon, .nav-item.active .nav-icon { transform: scale(1.2); }
    
    iframe { width: 100%; height: 100%; border: none; }
  </style>
