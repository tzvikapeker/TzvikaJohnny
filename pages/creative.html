      { id: "satire", nameHe: "סאטירה", nameEn: "SATIRE", items: ["1FtPi26yyuodpWMSMVVl7TY_oWNb_zoH8", "1ETWw7P3nIyU1iHFidj73qUrie_F-eEBL", "1uopf3TCKGOhNAUZiMc_27V0k9KEOfVJG", "1delXXclcyG_svChe_GL0sy6yT5jjFL7j", "1GnkS-bbr9OExp-6RHTBL7vBDezvTflWC", "148eaPKdRUx94TpXGCf_g65-b8ROiWqFf", "1ragwsoiuz7YpPebmw8rTQ3_FYEmaAo8q"], type: "video" },
      { id: "photos", nameHe: "תמונות", nameEn: "PHOTOS", items: ["1t2vlL9M7pwy6mOaj_WWmSUQ-Fa8pXhH_", "1_3mIqcPvHxEmlczw6IRIVXwzzbmcgni5", "1J2yiGEe3RpHPxuS6PSENQU8Dq6_cEyYF", "1QXYp34o4RWy6tiGimnrLLka9zMBSNpam", "1VT1yzoE6koqIlo6w3cFgfMC-I-tD1X9b", "1pHwnIVvbeom-3Qu6jMoJS9_zvI7xDACH"], type: "image" }
    ];

    let currentFolderItems = []; let currentMediaType = "video"; let currentMediaIndex = 0; let currentFolderObj = null;

    function renderFolders() {
      const grid = document.getElementById('folderGrid'); grid.innerHTML = "";
      creativeFolders.forEach(f => {
        const div = document.createElement('div');
        div.className = 'glass-card p-10 flex flex-col items-center justify-center cursor-pointer group';
        div.onclick = () => openFolder(f);
        div.innerHTML = `<div class="folder-icon-modern mb-6"></div><div class="font-heading font-black text-white text-xl uppercase group-hover:text-cyber-cyan transition-colors"><span class="he">${f.nameHe}</span><span class="en">${f.nameEn}</span></div>`;
        grid.appendChild(div);
      });
    }

    function openFolder(f) {
      document.getElementById('folderGrid').classList.add('hidden'); document.getElementById('mainHeader').classList.add('hidden');
      document.getElementById('folderContentView').classList.remove('hidden'); document.getElementById('folderContentView').classList.add('flex');
      currentFolderObj = f; currentFolderItems = f.items; currentMediaType = f.type; currentMediaIndex = 0;
      document.getElementById('currentFolderName').textContent = f.nameHe; loadCurrentMedia();
    }

    function loadCurrentMedia() {
      const id = currentFolderItems[currentMediaIndex]; const mediaBox = document.getElementById('mediaBox');
      mediaBox.innerHTML = currentMediaType === 'video' ? `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>` : `<img src="https://drive.google.com/thumbnail?id=${id}&sz=w1000" alt="Work">`;
      document.getElementById('mediaCounter').textContent = `${currentMediaIndex + 1} / ${currentFolderItems.length}`;
    }

    function changeMedia(dir) {
      if (dir === 'next') currentMediaIndex = (currentMediaIndex + 1) % currentFolderItems.length;
      else currentMediaIndex = (currentMediaIndex - 1 + currentFolderItems.length) % currentFolderItems.length;
      loadCurrentMedia();
    }

    function showFolders() { document.getElementById('folderGrid').classList.remove('hidden'); document.getElementById('mainHeader').classList.remove('hidden'); document.getElementById('folderContentView').classList.add('hidden'); }

    const savedLang = localStorage.getItem('siteLang') || 'he';
    document.documentElement.setAttribute('data-lang', savedLang);
    document.documentElement.setAttribute('dir', (savedLang === 'he' || savedLang === 'ar') ? 'rtl' : 'ltr');
    renderFolders();
  </script>
