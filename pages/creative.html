<!DOCTYPE html>
<html lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Creative Feed | Johnny Peker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; overflow: hidden; margin: 0; }
    .snap-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .snap-item {
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
    }
    .iframe-wrapper {
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>

  <div id="feed" class="snap-container"></div>

  <script>
    const videos = ["1ypXVriVw0EOC47YP2qRjgTnERK7fyJm9", "1KWPWnUOC_PdALG41iusJYhqQyuG0_6hh", "10ewLvB6Orq6_Q8BDc84JP9RyDCB1ArkH"]; // דוגמה ל-IDs

    const feed = document.getElementById('feed');
    
    // יצירת האינטרסצ'ן אובזרבר - טוען את ה-Iframe רק כשרואים את הפריט
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const wrapper = entry.target.querySelector('.iframe-wrapper');
        if (entry.isIntersecting) {
          if (!wrapper.innerHTML) {
            const id = wrapper.dataset.id;
            wrapper.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" class="w-full h-full" allow="autoplay"></iframe>`;
          }
        } else {
          wrapper.innerHTML = ''; // משחרר זיכרון כשיוצאים מהפריים
        }
      });
    }, { threshold: 0.5 });

    videos.forEach(id => {
      const item = document.createElement('div');
      item.className = "snap-item";
      item.innerHTML = `<div class="iframe-wrapper" data-id="${id}"></div>`;
      feed.appendChild(item);
      observer.observe(item);
    });
  </script>
</body>
</html>
