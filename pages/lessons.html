<!DOCTYPE html>
<html lang="he" data-lang="he" dir="rtl" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes" name="viewport"/>
  <title>Clients | Tzvika Johnny Peker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;700;900&family=Manrope:wght@300;400;600&family=Space+Grotesk:wght@300;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: { colors: { "cyber-cyan": "#00f2ff", "cyber-pink": "#ebb2ff" } } }
    }
  </script>

  <style>
    html:not([data-lang="he"]) .he { display: none !important; }
    html:not([data-lang="en"]) .en { display: none !important; }
    
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    
    /* הפיכת הדף לעמודה גמישה - פותר את ההסתרות */
    body { 
      background-color: #050505; color: #fff; font-family: 'Manrope', sans-serif; 
      overflow: hidden; height: 100dvh; margin: 0; 
      display: flex; flex-direction: column;
    }
    
    .material-symbols-outlined { font-size: 24px; display: inline-block; line-height: 1; vertical-align: middle; }
    
    /* 1. אזור כפתור חזרה עליון (שומר על המקום שלו) */
    .top-bar { 
      height: 70px; flex-shrink: 0; position: relative; width: 100%; z-index: 60;
    }
    .back-btn {
      position: absolute; top: 15px; right: 20px;
      color: rgba(255,255,255,0.7); text-decoration: none; font-size: 16px; font-weight: bold;
      display: flex; align-items: center; gap: 8px; transition: 0.3s;
      background: rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 20px; backdrop-filter: blur(10px);
    }
    .back-btn:hover { color: #00f2ff; border-color: #00f2ff; background: rgba(0,242,255,0.1); }

    /* 2. אזור שורת הלקוחות (הקפסולות) */
    .client-selector-wrapper {
      flex-shrink: 0; width: 100%; z-index: 50; display: flex; justify-content: center;
      padding-bottom: 10px;
    }
    .client-selector {
      display: flex; gap: 15px; padding: 5px 20px;
      overflow-x: auto; scroll-behavior: smooth; max-width: 100%;
    }
    .client-selector::-webkit-scrollbar { display: none; }
    
    .client-pill {
      flex-shrink: 0; white-space: nowrap; 
      background: rgba(20, 20, 25, 0.8); border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 20px; border-radius: 16px; color: #888; cursor: pointer;
      font-size: 13px; font-family: 'Space Grotesk', sans-serif; font-weight: bold; transition: all 0.4s ease;
      backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; gap: 6px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .client-pill .folder-icon { font-size: 28px; transition: 0.3s; color: rgba(255,255,255,0.3); }
    .client-pill:hover { background: rgba(0, 242, 255, 0.05); color: #fff; transform: translateY(-2px); }
    .client-pill:hover .folder-icon { color: #00f2ff; }
    .client-pill.active { 
      background: rgba(0, 242, 255, 0.1); color: #fff; border-color: #00f2ff; 
      box-shadow: 0 10px 25px rgba(0,242,255,0.25), inset 0 0 10px rgba(0,242,255,0.1); transform: translateY(-4px);
    }
    .client-pill.active .folder-icon { color: #00f2ff; font-variation-settings: 'FILL' 1; text-shadow: 0 0 10px rgba(0,242,255,0.8); }

    /* 3. אזור הנגן המרכזי והכפתורים - ממלא את החלל הנותר */
    .main-workspace { 
      flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
      min-height: 0; width: 100%; padding-bottom: 90px; /* משאיר מקום לדוק בתחתית */
    }
    
    .tiktok-container { 
      display: flex; flex-direction: column; align-items: center; width: 100%; 
    }
    
    .media-counter {
      margin-bottom: 15px; font-family: 'Space Grotesk'; font-size: 12px;
      color: #00f2ff; background: rgba(0,242,255,0.1); border: 1px solid rgba(0,242,255,0.3);
      padding: 4px 14px; border-radius: 20px; font-weight: bold; letter-spacing: 2px;
    }

    .tiktok-player {
      position: relative; 
      height: 50vh; /* קובע גובה דינמי בהתאם למסך כדי שלא ידרוס את הכפתורים */
      max-height: 500px;
      aspect-ratio: 9 / 16; 
      background: #000; border-radius: 24px; overflow: hidden;
      border: 2px solid rgba(0, 242, 255, 0.5); box-shadow: 0 10px 40px rgba(0, 242, 255, 0.2);
      transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s; transform-style: preserve-3d;
    }
    .tiktok-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    
    .swipe-next { animation: swipeNextAnim 0.6s forwards; }
    .swipe-prev { animation: swipePrevAnim 0.6s forwards; }
    @keyframes swipeNextAnim { 0% { transform: rotateY(90deg) scale(0.8); opacity: 0; } 100% { transform: rotateY(0deg) scale(1); opacity: 1; } }
    @keyframes swipePrevAnim { 0% { transform: rotateY(-90deg) scale(0.8); opacity: 0; } 100% { transform: rotateY(0deg) scale(1); opacity: 1; } }

    .controls { 
      display: flex; gap: 20px; margin-top: 25px; 
      width: 90%; max-width: 360px; /* תמיד יישאר רחב ונוח ללחיצה */
      justify-content: space-between; z-index: 60;
    }
    .control-btn {
      flex: 1; background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff;
      border-radius: 30px; padding: 12px; color: #00f2ff; font-size: 16px; font-weight: 900;
      cursor: pointer; transition: 0.3s; text-align: center; backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 0 15px rgba(0,242,255,0.2); text-shadow: 0 0 5px rgba(0,242,255,0.5);
    }
    .control-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 25px rgba(0,242,255,0.6); text-shadow: none; }

    /* 4. אזור הדוק התחתון */
    .sticky-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 50px;
      padding: 12px 20px; display: flex; gap: 15px; z-index: 9999;
      box-shadow: 0 15px 40px rgba(0,0,0,0.8);
      width: max-content; max-width: 95vw; overflow-x: auto; scroll-behavior: smooth;
    }
    .sticky-nav::-webkit-scrollbar { display: none; }

    .nav-item { 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; color: #aaa; font-size: 11px; font-family: 'Manrope', sans-serif; transition: 0.3s; 
      min-width: 50px; text-decoration: none;
    }
    .nav-icon { font-size: 22px; margin-bottom: 4px; transition: 0.3s; }
    .nav-item:hover, .nav-item.active { color: #00f2ff; font-weight: bold; }
    .nav-item:hover .nav-icon, .nav-item.active .nav-icon { transform: scale(1.2); }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="../index.html" class="back-btn"><span class="material-symbols-outlined">arrow_forward</span> <span class="he">חזרה</span><span class="en">BACK</span></a>
  </div>

  <div class="client-selector-wrapper">
    <div id="clientSelector" class="client-selector"></div>
  </div>

  <div class="main-workspace">
    <div class="tiktok-container">
      <div id="mediaCounter" class="media-counter">1 / X</div>
      
      <div id="playerWrapper" class="tiktok-player">
        <div id="mediaBox" class="w-full h-full"></div>
      </div>
      
      <div class="controls">
        <button class="control-btn" onclick="changeMedia('prev')"><span class="material-symbols-outlined">arrow_forward_ios</span> הקודם</button>
        <button class="control-btn" onclick="changeMedia('next')">הבא <span class="material-symbols-outlined">arrow_back_ios_new</span></button>
      </div>
    </div>
  </div>

  <nav class="sticky-nav">
    <a href="posttrauma.html" class="nav-item">
      <span class="nav-icon">🧠</span><span>טראומה</span>
    </a>
    <a href="songs.html" class="nav-item">
      <span class="nav-icon">🎵</span><span>שירים</span>
    </a>
    <a href="lessons.html" class="nav-item active">
      <span class="nav-icon material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">handshake</span><span>לקוחות</span>
    </a>
    <a href="podcasts.html" class="nav-item">
      <span class="nav-icon">📡</span><span>פודקאסט</span>
    </a>
    <a href="satire.html" class="nav-item">
      <span class="nav-icon">🎭</span><span>סאטירה</span>
    </a>
    <a href="creative.html" class="nav-item">
      <span class="nav-icon">🎨</span><span>יצירה</span>
    </a>
    <a href="../index.html" class="nav-item">
      <span class="nav-icon">🏠</span><span>ראשי</span>
    </a>
  </nav>

  <script>
    const clientFolders = [
      { id: "ayer", nameHe: "אייר", nameEn: "AYER", items: ["12y2WK-FZJWYCNAeggr4FM16j2ui2IiVj", "17IjrppE52avsjHGhESOCpsaRm6RhHpic", "1pI8ZeM_E6C0PCxuWKED-44KN0RZ0TwoB", "13bpe_2NZXW6kDwI0VYK05b5v4Gqbt1J3", "1xpGBmgSTWg3BzNGUVPW3u-cJfnc1ra3M", "1SAD1AdcHJOBNhKb5LCleSo6_wP4Qo0H4"] },
      { id: "hitech", nameHe: "חברת הייטק", nameEn: "HITECH", items: ["119FjF-QMX87MxV3GUkd9dXw-Bx0Jeagp"] },
      { id: "client3", nameHe: "לקוחה מס' 3", nameEn: "CLIENT #3", items: ["1oM7u_7gPeYZkCO0iu_zBGnAmVueggCZ8", "1mQYMAa3xHp_WF_4AWDEGGfYISpiQlXYI", "1_lFkjD9KLzNwc_W9Wn7hK50oahguW3yO"] },
      { id: "client4", nameHe: "לקוחה מס' 4", nameEn: "CLIENT #4", items: ["1_09Fircxmnu35OghR4XIFGON6-XY2nbC", "1lvPRWe17KOeFduiAQuEJaaZRHu3yaqYi", "18beVQ2_EzjpYf61C0O9vm4mcj-m0INVF", "1ewiteN_h9oq2gYOCE5xORU-3oDzItcEg", "1eSxGl6coC0jveFEddPw3jD4RINge_6AP"] },
      { id: "motti", nameHe: "מוטי", nameEn: "MOTTI", items: ["1OcpSA3LrqDm9j28zZb5mPWsh6DVAtmxO"] },
      { id: "moria", nameHe: "מוריה", nameEn: "MORIA", items: ["1VrndKVQtV5OTKIv_isBnzD2qIXQzKsln", "1BNBjwGUzYHfCduAiTB8tYTBxuIPmznKe", "1U2AAE0RLmooUUXEg66DQlHNRXETMZEZH", "1eTqkWXIGI24V101asuRDRTYOgBPYsF6O", "1fgkRTfeK_XA51FydwcQY2fNJRzXwlb5k", "1vwEgXkOqSUVA97Kv2sP5qjZp1yGP78i_", "1AYe7KFOO9u1JsvKkLKfCjoYXgq0vHsev", "1szS85c-0CUIcjrKPPVqyGH4UZKhJNRz4", "1I9GlKJNuej1Hl7Ydb9Vb3k9TVULzg9Li", "13avl6op9nhrVzfOnFRCfPPGfBga_qeRD", "150bjlBq8PtVTweo3fte5DNZSrLwV8ktB", "1D4TZfPViNqXgIQj06Xz8DOIzn1Rmexue", "18qCIG8dF8tkd8bzbdKgl4QWDIsL-xkiC", "1WYlMT022c3ppL5_LhhUeQNsv8jyrDkVg", "1eH0xLRvCxsmGTf_0J410ZqAC_WVkaZe2", "13ZlBruWdxLt_4LDNSmCe1xiCGXcZuoTi", "1k_eYs7WOemlABj2BkKGxBX_R7ji2R8kB", "1LhDPHmg9awvh7AtoriEcJljiGTM5nIni"] },
      { id: "shane", nameHe: "שיין", nameEn: "SHANE", items: ["1jn1pG-tucp1gTYyhtlN3v3LSqsg1xo-s", "1l431I7b_wix8TxKnGEdouKj_M8_viAf0", "12M2-F6-ZTlMMJQu3QOwM9Vk58CMnmihR", "1uWMnF_71E45qUcZGsXsnZkA3JM7NDMcR", "1qbFzbOdxirM0CbXxkKHhPg0F-IxEaEkG", "1pb0pQ8yyF1coUPDaPC8kAjJt_K8ipzS8", "1xroR7FbxqoFuIqzn_RVxLhf-6VNWOsOr", "1KkjdoJk35NG5EU5fZpgQoVCBiRl6bS0C", "1t0fMJv9ZjBz7jWtfIM7jVGjs6eAUyRux"] }
    ];

    let currentFolderObj = clientFolders[0];
    let currentMediaIndex = 0;

    function renderClientSelector() {
      const container = document.getElementById('clientSelector');
      container.innerHTML = "";
      const lang = document.documentElement.getAttribute('data-lang') || 'he';
      
      [...clientFolders].reverse().forEach(folder => {
        const btn = document.createElement('div');
        btn.className = `client-pill ${folder.id === currentFolderObj.id ? 'active' : ''}`;
        btn.innerHTML = `<span class="material-symbols-outlined folder-icon">folder_special</span> <span>${lang === 'en' ? folder.nameEn : folder.nameHe}</span>`;
        btn.onclick = () => selectClient(folder);
        container.appendChild(btn);
      });
      
      setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 50);
    }

    function selectClient(folder) {
      currentFolderObj = folder;
      currentMediaIndex = 0;
      renderClientSelector(); 
      loadCurrentMedia();
    }

    function loadCurrentMedia() {
      if (!currentFolderObj.items.length) return;
      const id = currentFolderObj.items[currentMediaIndex];
      const mediaBox = document.getElementById('mediaBox');
      
      mediaBox.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>`;
      document.getElementById('mediaCounter').textContent = `${currentMediaIndex + 1} / ${currentFolderObj.items.length}`;
    }

    function changeMedia(direction) {
      const wrapper = document.getElementById('playerWrapper');
      wrapper.classList.remove('swipe-next', 'swipe-prev');
      void wrapper.offsetWidth;
      
      const items = currentFolderObj.items;
      if (direction === 'next') { 
        currentMediaIndex = (currentMediaIndex + 1) % items.length; 
        wrapper.classList.add('swipe-next'); 
      } else { 
        currentMediaIndex = (currentMediaIndex - 1 + items.length) % items.length; 
        wrapper.classList.add('swipe-prev'); 
      }
      loadCurrentMedia();
    }

    renderClientSelector();
    loadCurrentMedia();
  </script>
</body>
