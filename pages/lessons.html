  <script>
    function toggleAccessMenu() { document.getElementById('access-menu').classList.toggle('hidden'); }
    function accessAction(type, btn) {

      if (type === 'textSize') body.classList.toggle('large-text');
      if (type === 'stopAnim') body.classList.toggle('no-animations');
      btn.classList.toggle('active');
    }

    // === כאן הוטמעו כל הלינקים החדשים שלך ===

      { id: "client4", nameHe: "לקוחה מס' 4", nameEn: "CLIENT #4", year: "2024", items: ["1_09Fircxmnu35OghR4XIFGON6-XY2nbC", "1lvPRWe17KOeFduiAQuEJaaZRHu3yaqYi", "18beVQ2_EzjpYf61C0O9vm4mcj-m0INVF", "1ewiteN_h9oq2gYOCE5xORU-3oDzItcEg", "1eSxGl6coC0jveFEddPw3jD4RINge_6AP"] },
      { id: "motti", nameHe: "מוטי", nameEn: "MOTTI", year: "2025", items: ["1OcpSA3LrqDm9j28zZb5mPWsh6DVAtmxO"] },

    let currentFolderItems = [];
    let currentMediaIndex = 0;
    let currentFolderObj = null;

    function renderFolders() {
      const grid = document.getElementById('folderGrid'); grid.innerHTML = "";
      clientFolders.forEach(f => {
        const div = document.createElement('div');
        div.className = 'glass-card rounded-[2rem] p-6 flex flex-col items-center justify-center cursor-pointer folder-card transition-all duration-300 group';
        div.onclick = () => openFolder(f);
        div.innerHTML = `
          <div class="folder-icon-modern group-hover:scale-110 transition-transform duration-500 mb-6"><span class="material-symbols-outlined text-white">person</span></div>
          <div class="font-['Epilogue'] font-black text-white text-lg md:text-xl tracking-widest text-center uppercase group-hover:text-cyber-cyan transition-colors">
            <span class="he">${f.nameHe}</span><span class="en">${f.nameEn}</span>
          </div>
          <div class="text-cyber-cyan/70 text-xs font-bold font-['Space_Grotesk'] mt-3 tracking-widest bg-cyber-cyan/10 px-3 py-1 rounded-full">${f.year}</div>
        `;
        grid.appendChild(div);
      });
    }

    function openFolder(f) {
      document.getElementById('folderGrid').classList.add('hidden');
      document.getElementById('mainHeader').classList.add('hidden');
      document.getElementById('folderContentView').classList.remove('hidden');
      document.getElementById('folderContentView').classList.add('flex');
      currentFolderObj = f;
      const lang = document.documentElement.getAttribute('data-lang');
      document.getElementById('currentFolderName').textContent = lang === 'en' ? f.nameEn : f.nameHe;
      currentFolderItems = f.items; currentMediaIndex = 0; loadCurrentMedia();
    }

    function loadCurrentMedia() {
      if (!currentFolderItems.length) return;
      const id = currentFolderItems[currentMediaIndex];
      const mediaBox = document.getElementById('mediaBox');
      // כל הלינקים החדשים נפתחים ב-Preview כברירת מחדל כדי להבטיח תצוגה
      mediaBox.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" loading="lazy" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>`;
      document.getElementById('mediaCounter').textContent = `${currentMediaIndex + 1} / ${currentFolderItems.length}`;
    }

    function changeMedia(direction) {
      const wrapper = document.getElementById('playerWrapper');
      wrapper.classList.remove('swipe-next', 'swipe-prev');
      void wrapper.offsetWidth;
      if (direction === 'next') { currentMediaIndex = (currentMediaIndex + 1) % currentFolderItems.length; wrapper.classList.add('swipe-next'); }
      else { currentMediaIndex = (currentMediaIndex - 1 + currentFolderItems.length) % currentFolderItems.length; wrapper.classList.add('swipe-prev'); }
      loadCurrentMedia();
    }

    function showFolders() {
      document.getElementById('folderGrid').classList.remove('hidden');
      document.getElementById('mainHeader').classList.remove('hidden');
      document.getElementById('folderContentView').classList.add('hidden');
      document.getElementById('folderContentView').classList.remove('flex');
    }

    const languages = ['he', 'en', 'ru', 'ar'];
    function toggleLang() {
      const html = document.documentElement;
      let nextIndex = (languages.indexOf(html.getAttribute('data-lang')) + 1) % languages.length;
      let newLang = languages[nextIndex];
      html.setAttribute('data-lang', newLang);
      html.setAttribute('dir', (newLang === 'he' || newLang === 'ar') ? 'rtl' : 'ltr');
      localStorage.setItem('siteLang', newLang);
      if(currentFolderObj) openFolder(currentFolderObj);
    }

    const savedLang = localStorage.getItem('siteLang') || 'he';
    document.documentElement.setAttribute('data-lang', savedLang);
    document.documentElement.setAttribute('dir', (savedLang === 'he' || savedLang === 'ar') ? 'rtl' : 'ltr');
    renderFolders();
  </script>
</body>
</html>
